<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Spirit Radio LW</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Spirit Radio LW</h1>

<div class="radio">
  <div class="dial-wrapper">
    <div id="dial" class="dial-line"></div>
  </div>
  <div class="frequency-labels">
    <span>153 kHz</span>
    <span>170</span>
    <span>200</span>
    <span>230</span>
    <span>260</span>
    <span>281 kHz</span>
  </div>
</div>



      <div class="display">
        <!-- Lo dejamos vacío, no mostramos texto -->
        <div id="message"></div>
      </div>

      <div class="controls">
        <button id="btnToggle">Iniciar</button>
      </div>

      <!-- Ruido estático ambiente -->
      <audio id="staticNoise" loop>
        <source src="static.mp3" type="audio/mpeg" />
      </audio>

      <!-- Banco de radio que sonará a trozos aleatorios -->
      <audio id="radioBank">
        <source src="radio.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <script src="app.js"></script>
  </body>
</html>
