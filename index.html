<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Spirit Radio LW - Pro</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Spirit Radio LW</h1>

      <div class="radio">
        <div class="dial-wrapper">
          <div id="dial" class="dial-line paused-anim"></div>
        </div>
        <div class="frequency-labels">
          <span>153 kHz</span><span>200</span><span>230</span><span>281 kHz</span>
        </div>
      </div>

      <div class="display">
        <div class="analyzer-grid">
          <div class="eq-track">
            <span class="eq-label">RF</span>
            <div class="eq-container" id="eq-rf"></div>
          </div>
          <div class="eq-track">
            <span class="eq-label">KIN</span>
            <div class="eq-container" id="eq-kin"></div>
          </div>
          <div class="eq-track">
            <span class="eq-label">MAG</span>
            <div class="eq-container" id="eq-mag"></div>
          </div>
          <div class="eq-track">
            <span class="eq-label">IR</span>
            <div class="eq-container" id="eq-ir"></div>
          </div>
        </div>
        <div id="message">OFFLINE</div>
      </div>

      <div class="controls">
        <button id="btnToggle">Iniciar</button>
        <button id="btnInfo" class="btn-secondary">?</button>
      </div>

      <div id="infoModal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h3>Monitoreo Multicanal</h3>
          <div class="modal-scroll">
            <p>Análisis de espectro en tiempo real procesando fluctuaciones electromagnéticas y cinéticas.</p>
          </div>
        </div>
      </div>

      <audio id="staticNoise" loop><source src="static.mp3" type="audio/mpeg" /></audio>
      <audio id="radioBank"><source src="radio.mp3" type="audio/mpeg" /></audio>
    </div>
    <script src="app.js"></script>
  </body>
</html>
