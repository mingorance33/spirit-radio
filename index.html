<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Spirit Radio LW</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Spirit Radio LW</h1>

      <div class="radio">
        <div class="dial-wrapper">
          <div id="dial" class="dial-line paused-anim"></div>
        </div>
        <div class="frequency-labels">
          <span>153 kHz</span>
          <span>170</span>
          <span>200</span>
          <span>230</span>
          <span>260</span>
          <span>281 kHz</span>
        </div>
      </div>

      <div class="display">
        <div id="message">OFFLINE</div>
      </div>

      <div class="controls">
        <button id="btnToggle">Iniciar</button>
        <button id="btnVisualizer" class="btn-secondary" title="Abrir Espectro">📺</button>
        <button id="btnInfo" class="btn-secondary">?</button>
      </div>

      <div id="infoModal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h3>Protocolo de Vigilancia Espectral</h3>
          <div class="modal-scroll">
            <p><strong>Ondas de Radio (LW):</strong> Monitoreo de bandas entre 153 y 281 kHz.</p>
            <p><strong>Energía Cinética:</strong> Detección de micro-vibraciones mediante acelerómetros.</p>
            <p><strong>Magnetómetro:</strong> Variaciones en campos electromagnéticos locales.</p>
          </div>
        </div>
      </div>

      <audio id="staticNoise" loop><source src="static.mp3" type="audio/mpeg" /></audio>
      <audio id="radioBank"><source src="radio.mp3" type="audio/mpeg" /></audio>
    </div>
    <script src="app.js"></script>
  </body>
</html>
