<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Spirit Radio LW</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Spirit Radio LW</h1>

      <div class="radio">
        <div class="dial-wrapper">
          <div id="dial" class="dial-line paused-anim"></div>
        </div>
        <div class="frequency-labels">
          <span>153 kHz</span><span>200</span><span>240</span><span>281 kHz</span>
        </div>
      </div>

      <div class="display">
        <div id="message">OFFLINE</div>
      </div>

      <div class="analyzer-grid">
        <div class="eq-track" data-label="RF"><div class="eq-container" id="eq-rf"></div></div>
        <div class="eq-track" data-label="KIN"><div class="eq-container" id="eq-kin"></div></div>
        <div class="eq-track" data-label="MAG"><div class="eq-container" id="eq-mag"></div></div>
        <div class="eq-track" data-label="IR"><div class="eq-container" id="eq-ir"></div></div>
      </div>

      <div class="controls">
        <button id="btnToggle">Iniciar</button>
      </div>

      <audio id="staticNoise" loop><source src="static.mp3" type="audio/mpeg" /></audio>
      <audio id="radioBank"><source src="radio.mp3" type="audio/mpeg" /></audio>
    </div>
    <script src="app.js"></script>
  </body>
</html>
