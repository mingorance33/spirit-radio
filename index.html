<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Spirit Radio LW</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Spirit Radio LW</h1>

      <div class="radio">
        <div class="dial-wrapper">
          <div id="dial" class="dial-line paused-anim"></div>
        </div>
        <div class="frequency-labels">
          <span>153 kHz</span><span>170</span><span>200</span><span>230</span><span>260</span><span>281 kHz</span>
        </div>
      </div>

      <div class="display">
        <div id="message">OFFLINE</div>
      </div>

      <div class="controls">
        <button id="btnToggle">Iniciar</button>
        <button id="btnVisual" class="btn-secondary" style="width: auto; padding: 0 15px; border-radius: 50px; font-size: 0.8rem;">Visual</button>
        <button id="btnInfo" class="btn-secondary">?</button>
      </div>

      <div id="visualModal" class="sensor-modal">
        <div class="sensor-header">
          <div class="sensor-title">
            <span>MONITOR DE ESPECTRO</span>
            <small id="modalFreq">153.000 kHz</small>
          </div>
          <button id="closeVisual">&times;</button>
        </div>
        <div class="analyzer-grid-full">
          <div class="eq-track" data-label="RADIO FREQUENCY (RF)"><div class="eq-container" id="eq-rf"></div></div>
          <div class="eq-track" data-label="KINETIC ENERGY (KIN)"><div class="eq-container" id="eq-kin"></div></div>
          <div class="eq-track" data-label="MAGNETIC FIELD (MAG)"><div class="eq-container" id="eq-mag"></div></div>
          <div class="eq-track" data-label="INFRARED (IR)"><div class="eq-container" id="eq-ir"></div></div>
        </div>
      </div>

      <div id="infoModal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h3>Protocolo de Vigilancia Espectral</h3>
          <div class="modal-scroll">
            <p>La percepción de los sonidos paranormales se obtiene mediante el monitoreo de ondas reales.</p>
          </div>
        </div>
      </div>

      <audio id="staticNoise" loop><source src="static.mp3" type="audio/mpeg" /></audio>
      <audio id="radioBank"><source src="radio.mp3" type="audio/mpeg" /></audio>
    </div>
    <script src="app.js"></script>
  </body>
</html>
