<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Osciloscopio Spirit Radio</title>
    <style>
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column; 
            height: 100vh; justify-content: space-around; padding: 40px 20px 20px 20px; 
            box-sizing: border-box; overflow: hidden; font-family: 'Courier New', Courier, monospace;
        }
        #btnClose {
            position: fixed; top: 10px; right: 10px; 
            background: #111; color: #ff3333; border: 2px solid #ff3333;
            width: 45px; height: 45px; cursor: pointer; border-radius: 4px;
            font-weight: bold; font-size: 20px; z-index: 100;
        }
        .container { 
            position: relative; width: 100%; height: 21%; 
            background: #020202; border: 1px solid #1a1a1a; 
            border-radius: 8px;
        }
        canvas { width: 100%; height: 100%; }
        .label { 
            position: absolute; top: 8px; left: 12px; 
            color: #888; font-size: 18px; font-weight: bold;
            letter-spacing: 2px; text-shadow: 1px 1px 2px #000;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>

    <div class="container"><span class="label">RF SPECTRUM</span><canvas id="c1"></canvas></div>
    <div class="container"><span class="label">KINETIC ENERGY</span><canvas id="c2"></canvas></div>
    <div class="container"><span class="label">MAGNETIC FIELD</span><canvas id="c3"></canvas></div>
    <div class="container"><span class="label">INFRARED SENSOR</span><canvas id="c4"></canvas></div>

    <script>
        let vol = 0;
        let t = 0;
        let isSpeaking = false;
        let realYAccel = 0; // Almacena el movimiento real

        window.onmessage = (e) => { 
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume;
                isSpeaking = e.data.isSpeaking;
                // Suavizamos un poco la entrada del acelerómetro para que no salte demasiado
                realYAccel = e.data.yAccel || 0;
            }
        };

        const waves = [
            { id: 'c1', col: '#ff3333', step: 0.02, speed: 0.1 },
            { id: 'c2', col: '#33ff33', step: 0.05, speed: 0.2 }, // Kinetic
            { id: 'c3', col: '#33aaff', step: 0.03, speed: 0.15 },
            { id: 'c4', col: '#ffcc00', step: 0.06, speed: 0.25 }
        ];

        function render() {
            t += 0.15;
            waves.forEach(w => {
                const canvas = document.getElementById(w.id);
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.strokeStyle = w.col;
                ctx.lineWidth = isSpeaking ? 3 : 2;
                ctx.shadowBlur = isSpeaking ? 15 : vol / 4;
                ctx.shadowColor = w.col;

                for(let x=0; x<canvas.width; x++) {
                    let agitation = isSpeaking ? (30 + Math.random()*20) : (vol * 0.7);
                    let baseSine = Math.sin(x * w.step + t * w.speed) * (isSpeaking ? 15 : 5);
                    
                    // LÓGICA DE MOVIMIENTO REAL:
                    // Si es el canal Kinetic Energy (c2), aplicamos el desplazamiento de realYAccel
                    let kineticShift = 0;
                    if(w.id === 'c2') {
                        kineticShift = realYAccel * 8; // Ajusta el '8' para más o menos sensibilidad
                    }

                    let jitter = (Math.random() - 0.5) * agitation;
                    
                    // Sumamos kineticShift a la posición Y
                    let y = (canvas.height/2) + baseSine + jitter + kineticShift;
                    
                    // Máscara para suavizar los bordes del canvas
                    let mask = Math.sin((x/canvas.width) * Math.PI);
                    y = (canvas.height/2) + (y - canvas.height/2) * mask;

                    if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });
            if(!isSpeaking) vol *= 0.85; 
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
