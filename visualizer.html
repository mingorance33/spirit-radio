<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Radio - Detección de Coincidencias</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        .ui-overlay {
            position: absolute; top: 15px; left: 15px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 11px; text-shadow: 0 0 8px #0ff; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">MODO: <span id="status">ANÁLISIS DE COINCIDENCIAS</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = []; // Array para los destellos
        let vol = 0, isSpeaking = false;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            // Subimos el Bloom para que los destellos "exploten" en brillo
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.8, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            // Crear Ondas
            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -7; x < 7; x += 0.1) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.8 });
                const line = new THREE.Line(geometry, material);
                // En esta versión las ponemos más juntas para facilitar coincidencias
                line.position.y = 1.5 - (i * 1.0);
                line.userData = { fStep: Math.random() * 10, speed: 0.003 + (Math.random() * 0.004) };
                scene.add(line);
                waves.push(line);
            }

            // Crear un prototipo de destello (pequeña esfera brillante)
            const sparkGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<10; i++) {
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function createSpark(x, y) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                s.mesh.scale.set(1, 1, 1);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now();

            // Actualizar Ondas
            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.01;
                const freq = (2 + i) + Math.sin(line.userData.fStep) * 1.5;
                const amp = (vol * 0.1) + 0.2 + (Math.sin(t * 0.002 + i) * 0.2);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5);
                    const y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);

                    // DETECCIÓN DE COINCIDENCIA:
                    // Si el punto está cruzando el eje X (punto cero) y la amplitud es alta
                    if (Math.abs(pos[j+1]) < 0.01 && Math.random() > 0.995) {
                        createSpark(x, line.position.y);
                    }
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            // Animar Destellos (desvanecimiento)
            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= 0.05;
                    s.mesh.scale.multiplyScalar(0.9);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
        }

        init();
        animate();
    </script>
</body>
</html>
