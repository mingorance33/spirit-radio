<!DOCTYPE html>
<html>
<head>
    <title>Scanner Monitor</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: space-around; padding: 15px; box-sizing: border-box; overflow: hidden;}
        .container { position: relative; width: 100%; height: 22%; background: #020202; border: 1px solid #111; border-radius: 4px; }
        canvas { width: 100%; height: 100%; }
        .label { position: absolute; top: 4px; left: 8px; color: #444; font-family: monospace; font-size: 9px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container"><span class="label">RF SPECTRUM</span><canvas id="c1"></canvas></div>
    <div class="container"><span class="label">KINETIC ENERGY</span><canvas id="c2"></canvas></div>
    <div class="container"><span class="label">MAGNETIC FIELD</span><canvas id="c3"></canvas></div>
    <div class="container"><span class="label">INFRARED SENSOR</span><canvas id="c4"></canvas></div>

    <script>
        let vol = 0;
        let t = 0;
        window.onmessage = (e) => { if(e.data.type === 'AUDIO_UPDATE') vol = e.data.volume; };

        const waves = [
            { id: 'c1', col: '#ff3333', step: 0.02, noise: 5 },
            { id: 'c2', col: '#33ff33', step: 0.05, noise: 8 },
            { id: 'c3', col: '#33aaff', step: 0.03, noise: 4 },
            { id: 'c4', col: '#ffcc00', step: 0.06, noise: 10 }
        ];

        function render() {
            t += 0.1;
            waves.forEach(w => {
                const canvas = document.getElementById(w.id);
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.strokeStyle = w.col;
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = vol / 2;
                ctx.shadowColor = w.col;

                for(let x=0; x<canvas.width; x++) {
                    let rand = (Math.random() - 0.5) * (vol * 0.5);
                    let sine = Math.sin(x * w.step + t) * (10 + vol/2);
                    let y = (canvas.height/2) + sine + rand;
                    
                    // Bordes suaves
                    let mask = Math.sin((x/canvas.width) * Math.PI);
                    y = (canvas.height/2) + (y - canvas.height/2) * mask;

                    if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
