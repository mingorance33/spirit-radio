<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Spirit Radio - Análisis Cuántico</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Courier New', monospace;
            /* Evita que el usuario haga zoom o scroll accidental */
            touch-action: none; 
        }
        #container { width: 100vw; height: 100vh; }
        
        /* CONTENEDOR DE BOTONES SUPERIORES */
        .top-controls {
            position: fixed;
            /* env-safe-area es la clave para que el notch no lo tape */
            top: calc(20px + env(safe-area-inset-top)); 
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 9999;
        }

        .btn-ui {
            background: rgba(0, 255, 255, 0.1); color: #0ff; 
            border: 2px solid #0ff; cursor: pointer;
            width: 60px; height: 60px;
            border-radius: 12px; font-weight: bold; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }
        
        #btnClose { border-color: #ff3333; color: #ff3333; }

        /* TEXTO DE ESTADO CON MARGEN DE SEGURIDAD */
        .ui-overlay {
            position: absolute; 
            top: calc(30px + env(safe-area-inset-top)); 
            left: 25px; 
            color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 18px; text-shadow: 0 0 10px #0ff; z-index: 10;
        }

        .data-panel {
            position: absolute; color: rgba(0, 255, 255, 0.4);
            font-size: 11px; pointer-events: none; z-index: 5;
            line-height: 1.2;
        }
        .bottom-left { bottom: calc(20px + env(safe-area-inset-bottom)); left: 20px; }
        .bottom-right { bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; text-align: right; }
        
        .highlight { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-controls">
        <button id="btnFS" class="btn-ui">⛶</button>
        <button id="btnClose" class="btn-ui">X</button>
    </div>

    <div class="ui-overlay">DETECTOR: <span id="status">BARRIDO RF</span></div>
    
    <div class="data-panel bottom-left" id="panel1"></div>
    <div class="data-panel bottom-right" id="panel2"></div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = [];
        let vol = 0, isSpeaking = false, isPaused = true;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        // LÓGICA FULLSCREEN
        const btnFS = document.getElementById('btnFS');
        btnFS.onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error al intentar pantalla completa: ${err.message}`);
                });
                btnFS.innerText = "◂▸";
            } else {
                document.exitFullscreen();
                btnFS.innerText = "⛶";
            }
        };

        const btnClose = document.getElementById('btnClose');
        btnClose.onclick = () => window.close();

        // NÚMEROS ALEATORIOS
        function genData() { return (Math.random() * 100).toFixed(6); }

        function updateDataPanels() {
            if (isPaused) return;
            const p1 = document.getElementById('panel1');
            const p2 = document.getElementById('panel2');
            const noise = isSpeaking ? "<span class='highlight'>ANOMALÍA</span><br>" : "SENS: " + genData() + "<br>";
            p1.innerHTML = noise + "EM_F: " + genData() + "<br>VOLT: " + (vol/100).toFixed(4);
            p2.innerHTML = "GAIN: " + (vol).toFixed(2) + "db<br>LNCY: " + (Math.random()*0.1).toFixed(4);
        }

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                isPaused = false;
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                const statusEl = document.getElementById('status');
                statusEl.innerText = isSpeaking ? "¡ENTIDAD!" : "BARRIDO";
                statusEl.style.color = isSpeaking ? "#ff0000" : "#0ff";
                updateDataPanels();
            }
            if(e.data.type === 'STOP_ALL') isPaused = true;
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -8; x < 8; x += 0.2) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.6 });
                const line = new THREE.Line(geometry, material);
                line.userData = { fStep: Math.random()*50, aStep: Math.random()*50, speed: 0.003 + (i*0.001) };
                scene.add(line);
                waves.push(line);
            }

            const sparkGeo = new THREE.SphereGeometry(0.05, 8, 8);
            for(let i=0; i<40; i++) {
                const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function triggerSpark(x, y, isPara) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                s.mesh.material.color.set(isPara ? 0xff0000 : 0xffffff);
                const size = isPara ? 4.0 : 0.8;
                s.mesh.scale.set(size, size, size);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) { composer.render(); return; }

            const t = Date.now();
            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.012;
                line.userData.aStep += 0.006;
                const freq = (2 + i) + Math.sin(line.userData.fStep) * 2;
                const amp = (vol * 0.15) + 0.3 + (Math.cos(line.userData.aStep) * 0.4);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5.5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.4;
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;
                for (let j = 0; j < posA.length; j += 3) {
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.03 && Math.abs(posA[j+1]) > 0.2) {
                        triggerSpark(posA[j], posA[j+1], isSpeaking);
                    }
                }
            }

            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= isSpeaking ? 0.05 : 0.12;
                    s.mesh.scale.multiplyScalar(0.92);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
            if(Math.random() > 0.8) updateDataPanels();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
