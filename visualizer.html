<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ultra Visualizer - Spirit Radio</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        .ui-overlay {
            position: absolute; top: 15px; left: 15px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 12px; text-shadow: 0 0 8px #0ff; z-index: 10;
        }
        #btnClose {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5);
            color: #ff3333; border: 1px solid #ff3333; cursor: pointer;
            padding: 8px 12px; z-index: 100; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">ESTADO: <span id="status">ESCANEANDO ESPECTRO</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer;
        let waves = [];
        let vol = 0, isSpeaking = false;
        
        const defaultColors = [0xff3333, 0x33ff33, 0x33aaff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                document.getElementById('status').innerText = isSpeaking ? "ENTIDAD DETECTADA" : "BARRIDO RF";
                document.getElementById('status').style.color = isSpeaking ? "#ff00ff" : "#0ff";
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -6; x < 6; x += 0.05) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                
                const material = new THREE.LineBasicMaterial({ color: defaultColors[i], transparent: true, opacity: 0.8 });
                const line = new THREE.Line(geometry, material);
                line.position.y = 1.8 - (i * 1.2);
                
                // --- NUEVO: Propiedad personalizada para la variación aleatoria ---
                line.userData = { 
                    noiseOffset: Math.random() * 100, // Punto de inicio en el ruido
                    currentAmp: 0.1 
                };
                
                scene.add(line);
                waves.push(line);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.004;

            waves.forEach((line, i) => {
                const positions = line.geometry.attributes.position.array;
                
                // 1. Variación aleatoria suave de la amplitud base (independiente para cada onda)
                line.userData.noiseOffset += 0.01;
                // Usamos Math.sin para que el cambio de amplitud no sea brusco
                const randomVariation = Math.abs(Math.sin(line.userData.noiseOffset)) * 0.3;
                
                const targetColor = new THREE.Color(isSpeaking ? 0xffffff : defaultColors[i]);
                line.material.color.lerp(targetColor, 0.08);

                for (let j = 0; j < positions.length; j += 3) {
                    const x = positions[j];
                    
                    // 2. Aplicamos la variación aleatoria a la amplitud
                    let freq = (2 + i) * 0.8;
                    let amp = (vol * 0.06) + 0.05 + randomVariation; 
                    
                    if (isSpeaking) {
                        freq *= 2.5;
                        amp += 0.6;
                        positions[j + 1] += (Math.random() - 0.5) * 0.15; // Jitter paranormal
                    }

                    const edgeMask = Math.cos(x / 4.0);
                    const y = Math.sin(x * freq + time + i) * amp * edgeMask;
                    positions[j + 1] = THREE.MathUtils.lerp(positions[j + 1], y, 0.2);
                }
                
                line.geometry.attributes.position.needsUpdate = true;
            });

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
