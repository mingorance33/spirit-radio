<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ultra Visualizer - Spirit Radio</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        .ui-overlay {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 12px; text-shadow: 0 0 10px #0ff;
        }
        #btnClose {
            position: fixed; top: 10px; right: 10px; background: none;
            color: #ff3333; border: 1px solid #ff3333; cursor: pointer;
            padding: 5px 10px; z-index: 100;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">CERRAR VÍNCULO</button>
    <div class="ui-overlay">VINCULANDO ESPECTRO... <span id="status">Buscando</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer;
        let waves = [];
        let vol = 0, isSpeaking = false, paranormalIntensity = 0;

        // --- CONEXIÓN CON APP.JS ---
        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume || 0;
                if (!isSpeaking && e.data.isSpeaking) paranormalIntensity = 2.0;
                isSpeaking = e.data.isSpeaking;
                document.getElementById('status').innerText = isSpeaking ? "ENTIDAD DETECTADA" : "BARRIDO RF";
                document.getElementById('status').style.color = isSpeaking ? "#ff00ff" : "#0ff";
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // --- POST-PROCESADO (EL SECRETO DEL BRILLO) ---
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, // Fuerza del brillo
                0.4, // Radio
                0.85 // Umbral
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Crear 4 ondas (RF, Kinetic, Magnetic, Infrared)
            const colors = [0xff3333, 0x33ff33, 0x33aaff, 0xffcc00];
            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -5; x < 5; x += 0.05) {
                    points.push(new THREE.Vector3(x, 0, 0));
                }
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], linewidth: 2 });
                const line = new THREE.Line(geometry, material);
                line.position.y = 1.5 - (i * 1.0);
                scene.add(line);
                waves.push(line);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.005;

            waves.forEach((line, i) => {
                const positions = line.geometry.attributes.position.array;
                const colorBase = isSpeaking ? new THREE.Color(0xff00ff) : line.material.color;

                for (let j = 0; j < positions.length; j += 3) {
                    const x = positions[j];
                    
                    // Lógica de onda: Senoidal + Volumen + Ruido Paranormal
                    const freq = 2 + i;
                    const amp = (vol * 0.05) + (isSpeaking ? 0.5 : 0.1);
                    const noise = (Math.random() - 0.5) * (paranormalIntensity * 0.5);
                    
                    // Efecto de "atenuación" en los bordes para que no corten
                    const edgeMask = Math.cos(x / 3.5); 
                    
                    positions[j + 1] = Math.sin(x * freq + time) * amp * edgeMask + noise;
                }
                line.geometry.attributes.position.needsUpdate = true;
                
                // Animación de color si hay voz
                if(isSpeaking) {
                    line.material.color.lerp(new THREE.Color(0xffffff), 0.1);
                } else {
                    line.material.color.lerp(new THREE.Color(line.material.color), 0.1);
                }
            });

            paranormalIntensity *= 0.95; // Decaimiento
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
