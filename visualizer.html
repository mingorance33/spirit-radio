<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Radio - Detección Total</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        
        /* Botón de cierre restaurado y visible */
        #btnClose {
            position: fixed; top: 20px; right: 20px; 
            background: rgba(255, 0, 0, 0.2); color: #ff3333; 
            border: 2px solid #ff3333; cursor: pointer;
            width: 40px; height: 40px; z-index: 999;
            border-radius: 50%; font-weight: bold; font-size: 18px;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        #btnClose:hover { background: #ff3333; color: #000; shadow: 0 0 15px #ff3333; }

        .ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 11px; text-shadow: 0 0 8px #0ff; z-index: 10;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">DETECTOR DE COINCIDENCIAS: <span id="status">BARRIDO TOTAL</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = [];
        let vol = 0, isSpeaking = false;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            // Crear Ondas (más juntas para que colisionen constantemente)
            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -7; x < 7; x += 0.15) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.7 });
                const line = new THREE.Line(geometry, material);
                line.position.y = 0; // Todas en el mismo eje Y para colisión total
                
                line.userData = { 
                    fStep: Math.random() * 50, 
                    aStep: Math.random() * 50,
                    speed: 0.002 + (i * 0.001) 
                };
                
                scene.add(line);
                waves.push(line);
            }

            // Pool de destellos (aumentado a 50 para cubrir todos los cruces)
            const sparkGeo = new THREE.SphereGeometry(0.04, 6, 6);
            const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<50; i++) {
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function triggerSpark(x, y) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                s.mesh.scale.set(1.5, 1.5, 1.5);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now();

            // 1. Actualizar posiciones de todas las ondas
            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.01;
                line.userData.aStep += 0.005;

                const freq = (2 + i) + Math.sin(line.userData.fStep) * 2;
                const amp = (vol * 0.12) + 0.3 + (Math.cos(line.userData.aStep) * 0.4);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.3;
                    
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            // 2. DETECCIÓN DE COINCIDENCIAS CRÍTICAS (Todos los cruces)
            // Comparamos la onda 0 con la 1, la 1 con la 2, etc.
            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;

                for (let j = 0; j < posA.length; j += 3) {
                    // Si las Y de dos ondas están muy cerca, hay coincidencia
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.02) {
                        // Solo disparamos destello si la amplitud es significativa (> 0.1)
                        if (Math.abs(posA[j+1]) > 0.1) {
                            triggerSpark(posA[j], posA[j+1]);
                        }
                    }
                }
            }

            // 3. Animación de destellos
            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= 0.1; // Desaparecen rápido para no saturar
                    s.mesh.scale.multiplyScalar(0.85);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
