<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }
        .v-column {
            flex: 1;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .v-column span {
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            text-align: center;
        }
        .wave {
            width: 80%;
            height: 0%;
            transition: height 0.15s ease-out;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            opacity: 0.8;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        /* Colores del video original */
        .blue { background: linear-gradient(#00d2ff, #3a7bd5); }
        .green { background: linear-gradient(#11ffbd, #aaff00); }
        .yellow { background: linear-gradient(#ffe259, #ffa751); }
        .red { background: linear-gradient(#ff416c, #ff4b2b); }
    </style>
</head>
<body>
    <div class="v-column"><span>Ondas Radio</span><div id="w1" class="wave blue"></div></div>
    <div class="v-column"><span>En. Cinética</span><div id="w2" class="wave green"></div></div>
    <div class="v-column"><span>Magnetómetro</span><div id="w3" class="wave yellow"></div></div>
    <div class="v-column"><span>Infrarrojos</span><div id="w4" class="wave red"></div></div>

    <script>
        // Escucha mensajes de la ventana principal
        window.addEventListener('message', (event) => {
            if (event.data.type === 'UPDATE') {
                document.querySelectorAll('.wave').forEach(w => {
                    const h = Math.floor(Math.random() * 70) + 10;
                    w.style.height = h + '%';
                });
            } else if (event.data.type === 'STOP') {
                document.querySelectorAll('.wave').forEach(w => w.style.height = '0%');
            }
        });
    </script>
</body>
</html>
