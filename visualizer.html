<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Radio - Análisis Cuántico</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        
        /* BOTÓN DE CIERRE */
        #btnClose {
            position: fixed; top: 30px; right: 30px; 
            background: rgba(255, 0, 0, 0.1); color: #ff3333; 
            border: 2px solid #ff3333; cursor: pointer;
            width: 70px; height: 70px; z-index: 9999;
            border-radius: 50%; font-weight: bold; font-size: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        /* TEXTO DE ESTADO */
        .ui-overlay {
            position: absolute; top: 35px; left: 30px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 3px;
            font-size: 20px; text-shadow: 0 0 10px #0ff; z-index: 10;
        }

        /* PANELES DE DATOS (NÚMEROS ALTERÁNDOSE) */
        .data-panel {
            position: absolute; color: rgba(0, 255, 255, 0.5);
            font-size: 12px; pointer-events: none; z-index: 5;
            line-height: 1.2; text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }
        .bottom-left { bottom: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; text-align: right; }
        .top-center { top: 80px; left: 30px; color: rgba(255, 255, 255, 0.3); }

        .highlight { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">DETECTOR: <span id="status">BARRIDO RF</span></div>
    
    <div class="data-panel bottom-left" id="panel1"></div>
    <div class="data-panel bottom-right" id="panel2"></div>
    <div class="data-panel top-center" id="panel3"></div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = [];
        let vol = 0, isSpeaking = false, isPaused = true;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        // Función para generar números aleatorios con muchos decimales
        function genData() {
            return (Math.random() * 100).toFixed(8);
        }

        function updateDataPanels() {
            if (isPaused) return;
            
            const p1 = document.getElementById('panel1');
            const p2 = document.getElementById('panel2');
            const p3 = document.getElementById('panel3');

            const noise = isSpeaking ? "<span class='highlight'>ANOMALÍA DETECTADA</span><br>" : "SENS_ISO: " + genData() + "<br>";

            p1.innerHTML = noise + "EM_FLUX: " + genData() + "<br>V_STAB: " + genData() + "<br>Q_BIT: " + (vol/100).toFixed(10);
            p2.innerHTML = "RF_GAIN: " + (vol * 1.5).toFixed(4) + "db<br>LATENCY: " + (Math.random()*0.1).toFixed(6) + "ms<br>SPEC_DIST: " + genData();
            p3.innerHTML = "NODE_" + Math.floor(Math.random()*999) + ": " + genData();
        }

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                isPaused = false;
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                const statusEl = document.getElementById('status');
                statusEl.innerText = isSpeaking ? "¡ENTIDAD DETECTADA!" : "BARRIDO ACTIVO";
                statusEl.style.color = isSpeaking ? "#ff0000" : "#0ff";
                updateDataPanels();
            }
            if(e.data.type === 'STOP_ALL') {
                isPaused = true;
                document.getElementById('status').innerText = "OFFLINE";
                document.getElementById('status').style.color = "#555";
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            // Crear Ondas
            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -8; x < 8; x += 0.15) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.6 });
                const line = new THREE.Line(geometry, material);
                line.userData = { fStep: Math.random()*50, aStep: Math.random()*50, speed: 0.003 + (i*0.001) };
                scene.add(line);
                waves.push(line);
            }

            // Chispas
            const sparkGeo = new THREE.SphereGeometry(0.04, 8, 8);
            for(let i=0; i<60; i++) {
                const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function triggerSpark(x, y, isPara) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                s.mesh.material.color.set(isPara ? 0xff0000 : 0xffffff);
                const size = isPara ? 4.5 : 1.0;
                s.mesh.scale.set(size, size, size);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) { composer.render(); return; }

            const t = Date.now();
            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.012;
                line.userData.aStep += 0.006;
                const freq = (2 + i) + Math.sin(line.userData.fStep) * 2;
                const amp = (vol * 0.15) + 0.3 + (Math.cos(line.userData.aStep) * 0.4);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5.5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.4;
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            // Colisiones
            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;
                for (let j = 0; j < posA.length; j += 3) {
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.02 && Math.abs(posA[j+1]) > 0.2) {
                        triggerSpark(posA[j], posA[j+1], isSpeaking);
                    }
                }
            }

            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= isSpeaking ? 0.04 : 0.1;
                    s.mesh.scale.multiplyScalar(0.92);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
            // Actualizar datos cada frame para efecto de alta velocidad
            if(Math.random() > 0.7) updateDataPanels();
        }

        init();
        animate();
    </script>
</body>
</html>
