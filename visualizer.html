<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Radio - Espectro Sincronizado</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        
        #btnClose {
            position: fixed; top: 20px; right: 20px; 
            background: rgba(20, 0, 0, 0.6); color: #ff3333; 
            border: 2px solid #ff3333; cursor: pointer;
            width: 45px; height: 45px; z-index: 9999;
            border-radius: 50%; font-weight: bold; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 11px; text-shadow: 0 0 8px #0ff; z-index: 10;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">SISTEMA: <span id="status">ESPERANDO INICIO...</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = [];
        let vol = 0, isSpeaking = false, isPaused = true;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                isPaused = false; // Reanudar si llegan datos
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                document.getElementById('status').innerText = isSpeaking ? "¡ENTIDAD DETECTADA!" : "BARRIDO ACTIVO";
                document.getElementById('status').style.color = isSpeaking ? "#ff0000" : "#0ff";
            }
            if(e.data.type === 'STOP_ALL') {
                isPaused = true; // Congelar visualizador
                document.getElementById('status').innerText = "CONGELADO - OFFLINE";
                document.getElementById('status').style.color = "#555";
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -8; x < 8; x += 0.1) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.7 });
                const line = new THREE.Line(geometry, material);
                line.userData = { fStep: Math.random()*50, aStep: Math.random()*50, speed: 0.003 + (i*0.001) };
                scene.add(line);
                waves.push(line);
            }

            const sparkGeo = new THREE.SphereGeometry(0.04, 8, 8);
            for(let i=0; i<60; i++) {
                const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function triggerSpark(x, y, isParanormal) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                s.mesh.material.color.set(isParanormal ? 0xff0000 : 0xffffff);
                const size = isParanormal ? 4.5 : 1.5;
                s.mesh.scale.set(size, size, size);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // SI ESTÁ PAUSADO, NO ACTUALIZAMOS NADA (Efecto congelado)
            if (isPaused) {
                composer.render(); // Renderizar frame estático
                return; 
            }

            const t = Date.now();

            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.012;
                line.userData.aStep += 0.006;

                const freq = (2 + i) + Math.sin(line.userData.fStep) * 2;
                const amp = (vol * 0.15) + 0.3 + (Math.cos(line.userData.aStep) * 0.4);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5.5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.4;
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
                
                const targetColor = new THREE.Color(isSpeaking ? 0xffffff : colors[i]);
                line.material.color.lerp(targetColor, 0.1);
            });

            // Colisiones
            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;
                for (let j = 0; j < posA.length; j += 3) {
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.03 && Math.abs(posA[j+1]) > 0.1) {
                        triggerSpark(posA[j], posA[j+1], isSpeaking);
                    }
                }
            }

            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= isSpeaking ? 0.04 : 0.08;
                    s.mesh.scale.multiplyScalar(0.92);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
