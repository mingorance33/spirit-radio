<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Espectro Spirit Radio - Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #container { width: 100vw; height: 100vh; cursor: none; }
        .ui {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            font-family: monospace; font-size: 10px; letter-spacing: 1px;
            text-shadow: 0 0 5px #0ff; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui">SISTEMA DE ANÁLISIS ESPECTRAL V1.0</div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let vol = 0, isSpeaking = false;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.0, 0.5, 0.15);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -8; x < 8; x += 0.05) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.8 });
                const line = new THREE.Line(geometry, material);
                line.position.y = 1.8 - (i * 1.2);
                
                // Configuración para el efecto del vídeo:
                line.userData = { 
                    f: Math.random() * 10,  // fase inicial
                    fV: 0.02 + Math.random() * 0.05, // velocidad de cambio de frecuencia
                    aV: 0.01 + Math.random() * 0.03  // velocidad de cambio de amplitud
                };
                
                scene.add(line);
                waves.push(line);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;

            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                const ud = line.userData;

                // Variación de color dinámica (Flash blanco)
                const targetColor = new THREE.Color(isSpeaking ? 0xffffff : colors[i]);
                line.material.color.lerp(targetColor, 0.15);

                // --- LÓGICA DE INESTABILIDAD TIPO VÍDEO ---
                // La frecuencia cambia sola usando una función de seno desfasada
                const currentFreq = (2 + i) + Math.sin(t * 2 + i) * 1.5;
                // La amplitud base tiene un "temblor" constante
                const currentAmp = (vol * 0.1) + 0.15 + (Math.sin(t * 3 + i) * 0.2);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    
                    // Modificador de longitud de onda por punto (crea el efecto de "serpiente")
                    const waveX = x * currentFreq + (t * (3 + i));
                    
                    // Mezclamos dos senos para romper la simetría perfecta
                    let y = Math.sin(waveX) * currentAmp;
                    y += Math.sin(waveX * 0.5) * (currentAmp * 0.3); 

                    if (isSpeaking) {
                        // Distorsión agresiva si hay voz
                        y += (Math.random() - 0.5) * 0.4; 
                    }

                    // Atenuación en los bordes
                    const mask = Math.cos(x / 5.5);
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y * mask, 0.3);
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
