<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Radio - Espectro Sutil</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }
        
        #btnClose {
            position: fixed; top: 20px; right: 20px; 
            background: rgba(20, 0, 0, 0.4); color: #ff3333; 
            border: 1px solid #ff3333; cursor: pointer;
            width: 40px; height: 40px; z-index: 9999;
            border-radius: 50%; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }

        .ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 10px; opacity: 0.7; z-index: 10;
        }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">SISTEMA: <span id="status">BARRIDO SILENCIOSO</span></div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [];
        let sparks = [];
        let vol = 0, isSpeaking = false, isPaused = true;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                isPaused = false;
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                document.getElementById('status').innerText = isSpeaking ? "¡ACTIVIDAD DETECTADA!" : "BARRIDO RF";
                document.getElementById('status').style.color = isSpeaking ? "#ff0000" : "#0ff";
            }
            if(e.data.type === 'STOP_ALL') isPaused = true;
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            // Bloom ajustado para que el blanco no "queme" tanto la imagen
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.2);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BufferGeometry();
                const points = [];
                for (let x = -8; x < 8; x += 0.12) points.push(new THREE.Vector3(x, 0, 0));
                geometry.setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.6 });
                const line = new THREE.Line(geometry, material);
                line.userData = { fStep: Math.random()*50, aStep: Math.random()*50, speed: 0.003 + (i*0.001) };
                scene.add(line);
                waves.push(line);
            }

            // Pool de chispas con material transparente para la sutileza
            const sparkGeo = new THREE.SphereGeometry(0.03, 6, 6);
            for(let i=0; i<80; i++) {
                const sparkMat = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    transparent: true, 
                    opacity: 0.5 // Más sutil por defecto
                });
                const s = new THREE.Mesh(sparkGeo, sparkMat);
                s.visible = false;
                scene.add(s);
                sparks.push({ mesh: s, life: 0 });
            }
        }

        function triggerSpark(x, y, isPara) {
            let s = sparks.find(sp => !sp.mesh.visible);
            if (s) {
                s.mesh.position.set(x, y, 0);
                s.mesh.visible = true;
                s.life = 1.0;
                
                if (isPara) {
                    s.mesh.material.color.set(0xff0000);
                    s.mesh.material.opacity = 1.0; // Rojo sólido y brillante
                    s.mesh.scale.set(5.0, 5.0, 5.0); // Gigante
                } else {
                    s.mesh.material.color.set(0xffffff);
                    s.mesh.material.opacity = 0.3; // Blanco tenue
                    s.mesh.scale.set(0.8, 0.8, 0.8); // Muy pequeño
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) { composer.render(); return; }

            const t = Date.now();

            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.01;
                line.userData.aStep += 0.005;

                const freq = (2 + i) + Math.sin(line.userData.fStep) * 1.8;
                const amp = (vol * 0.12) + 0.25 + (Math.cos(line.userData.aStep) * 0.35);

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5.5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.3;
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
                line.material.color.lerp(new THREE.Color(isSpeaking ? 0xffffff : colors[i]), 0.1);
            });

            // Colisiones con umbral de detección
            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;
                for (let j = 0; j < posA.length; j += 3) {
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.02) {
                        // Solo mostramos chispas si hay energía suficiente (amp > 0.2)
                        if (Math.abs(posA[j+1]) > 0.2) {
                            triggerSpark(posA[j], posA[j+1], isSpeaking);
                        }
                    }
                }
            }

            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= isSpeaking ? 0.03 : 0.15; // Las chispas sutiles desaparecen muy rápido
                    s.mesh.scale.multiplyScalar(0.9);
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
        }

        init();
        animate();
    </script>
</body>
</html>
