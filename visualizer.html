<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Osciloscopio Spirit Radio (PixiJS)</title>
    <style>
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column; 
            height: 100vh; justify-content: space-around; padding: 40px 20px 20px 20px; 
            box-sizing: border-box; overflow: hidden; font-family: 'Courier New', Courier, monospace;
        }
        
        #btnClose {
            position: fixed; top: 10px; right: 10px; 
            background: #111; color: #ff3333; border: 2px solid #ff3333;
            width: 45px; height: 45px; cursor: pointer; border-radius: 4px;
            font-weight: bold; font-size: 20px; z-index: 100;
        }

        .panel { 
            position: relative; width: 100%; height: 21%; 
            background: radial-gradient(circle at 50% 0%, #111 0, #020202 40%, #000 100%);
            border: 1px solid #1a1a1a; 
            border-radius: 8px;
            overflow: hidden;
        }

        .label { 
            position: absolute; 
            top: 8px; 
            left: 12px; 
            color: #bbb;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px; 
            text-shadow: 1px 1px 3px #000; 
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
<button id="btnClose" onclick="window.close()">X</button>

<div class="panel" data-index="0"><span class="label">RF SPECTRUM</span></div>
<div class="panel" data-index="1"><span class="label">KINETIC ENERGY</span></div>
<div class="panel" data-index="2"><span class="label">MAGNETIC FIELD</span></div>
<div class="panel" data-index="3"><span class="label">INFRARED SENSOR</span></div>

<!-- CDN PixiJS v8 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.0.4/pixi.min.js" integrity="sha512-zG7dvpvT1Q5iGdrO0o2sl0+xY3sH9XbX3O1u/eRpb+0NeBPQ9wdW8tHztFHJNB8IPn3P4FKFeY+jA7fG0qTp7w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
let vol = 0;
let isSpeaking = false;
let t = 0;
let paranormalIntensity = 0;

// Recibe datos desde app.js
window.onmessage = (e) => {
    if (e.data.type === 'AUDIO_UPDATE') {
        vol = e.data.volume || 0;
        const prev = isSpeaking;
        isSpeaking = !!e.data.isSpeaking;

        // Debug opcional:
        // console.log('AUDIO_UPDATE', vol, isSpeaking);

        if (!prev && isSpeaking) {
            paranormalIntensity = 1;   // pico al inicio de cada voz
        }
    }
};

const panels = Array.from(document.querySelectorAll('.panel'));
const colors = [0xFF3333, 0x33FF33, 0x33AAFF, 0xFFCC00];

const apps = [];
const waves = [];

panels.forEach((panel, idx) => {
    const app = new PIXI.Application({
        resizeTo: panel,
        backgroundAlpha: 0,
        antialias: true
    });
    panel.appendChild(app.view);
    apps.push(app);

    const wave = new PIXI.Graphics();
    const glow = new PIXI.filters.BlurFilter(0, 1);
    wave.filters = [glow];

    app.stage.addChild(wave);

    waves.push({
        app,
        gfx: wave,
        glow,
        color: colors[idx],
        step: [0.02,0.05,0.03,0.06][idx],
        speed: [0.12,0.20,0.16,0.24][idx],
        baseAmp: [1.0,0.9,0.8,0.7][idx]
    });
});

function drawWave(w) {
    const app = w.app;
